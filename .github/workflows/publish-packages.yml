name: Publish Packages to npm

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major, or skip)'
        required: false
        default: 'skip'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: make build-all

      - name: Test
        run: make test

  smoke:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: make build-all

      - name: Pack all packages
        run: |
          mkdir -p /tmp/tarballs
          for pkg in packages/core cli mcp-server packages/worktree-pool; do
            (cd "$pkg" && npm pack --pack-destination /tmp/tarballs)
          done
          ls -1 /tmp/tarballs

      - name: Install tarballs into a fixture project
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          # `ls ... | head -1` guards against npm pack ever producing multiple
          # matching tarballs (e.g. versioned + tag-suffixed builds).
          CORE_TGZ=$(ls /tmp/tarballs/ai-dossier-core-*.tgz | head -1)
          CLI_TGZ=$(ls /tmp/tarballs/ai-dossier-cli-*.tgz | head -1)
          # cli depends on @ai-dossier/core; install both via file: so npm
          # resolves the peer locally without needing the registry version.
          cat > package.json <<EOF
          {
            "name": "smoke-fixture",
            "version": "0.0.0",
            "private": true,
            "dependencies": {
              "@ai-dossier/core": "file:$CORE_TGZ",
              "@ai-dossier/cli":  "file:$CLI_TGZ"
            }
          }
          EOF
          npm install --no-audit --no-fund

      - name: Tier 1 — non-interactive smoke (each wrapped in timeout)
        run: |
          BIN=/tmp/smoke/node_modules/.bin/ai-dossier
          test -x "$BIN" || (echo "ai-dossier binary not executable at $BIN"; exit 1)

          echo "::group::ai-dossier --version"
          timeout 10s "$BIN" --version
          echo "::endgroup::"

          echo "::group::ai-dossier doctor"
          # `doctor` may exit non-zero for environment warnings (no MCP config,
          # missing claude binary on a clean runner). We only care that the
          # process exits within the timeout, not the diagnostic outcome.
          timeout 10s "$BIN" doctor || true
          echo "::endgroup::"

          echo "::group::ai-dossier whoami (with fixture token)"
          PAYLOAD=$(node -e "process.stdout.write(Buffer.from(JSON.stringify({sub:'smoke',orgs:[],exp:Math.floor(Date.now()/1000)+86400})).toString('base64url'))")
          # Inline env: token is scoped to this single command invocation only,
          # never visible to follow-on commands or hooks in this step.
          DOSSIER_REGISTRY_TOKEN="header.${PAYLOAD}.sig" \
            HOME="$(mktemp -d)" \
            timeout 10s "$BIN" whoami
          echo "::endgroup::"

      - name: Tier 2 — interactive login smoke (regression guard for #386)
        run: |
          BIN=/tmp/smoke/node_modules/.bin/ai-dossier
          test -x "$BIN" || (echo "ai-dossier binary not executable at $BIN"; exit 1)
          # smoke.mjs sets DOSSIER_LOGIN_ALLOW_NONINTERACTIVE=1 internally to
          # bypass login's TTY guard while exercising the full success path.
          node cli/test/smoke/login.smoke.mjs "$BIN"

  publish:
    needs: [test, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Bump version (manual dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != 'skip'
        run: |
          # Bump core version
          cd packages/core
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          CORE_VERSION=$(node -p "require('./package.json').version")
          echo "CORE_VERSION=$CORE_VERSION" >> $GITHUB_ENV

          # Bump CLI version
          cd ../../cli
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          npm pkg set "dependencies.@ai-dossier/core=^$CORE_VERSION"

          # Bump MCP server version
          cd ../mcp-server
          npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Commit and tag version bump
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json cli/package.json mcp-server/package.json
          VERSION=$(cd cli && node -p "require('./package.json').version")
          git commit -m "chore: bump version to $VERSION"
          git tag "v$VERSION"
          git push
          git push origin "v$VERSION"

      - name: Build all packages
        run: make build-all

      - name: Check if @ai-dossier/core needs publishing
        id: check-core
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          PUBLISHED=$(npm view @ai-dossier/core version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Core $CURRENT already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing core $CURRENT (current published: $PUBLISHED)"
          fi

      - name: Publish @ai-dossier/core
        if: steps.check-core.outputs.skip != 'true'
        run: |
          cd packages/core
          npm publish --provenance --access public

      - name: Check if @ai-dossier/cli needs publishing
        id: check-cli
        run: |
          CURRENT=$(node -p "require('./cli/package.json').version")
          PUBLISHED=$(npm view @ai-dossier/cli version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "CLI $CURRENT already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing CLI $CURRENT (current published: $PUBLISHED)"
          fi

      - name: Publish @ai-dossier/cli
        if: steps.check-cli.outputs.skip != 'true'
        run: |
          cd cli
          npm publish --provenance --access public

      - name: Check if @ai-dossier/mcp-server needs publishing
        id: check-mcp
        run: |
          CURRENT=$(node -p "require('./mcp-server/package.json').version")
          PUBLISHED=$(npm view @ai-dossier/mcp-server version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "MCP server $CURRENT already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing MCP server $CURRENT (current published: $PUBLISHED)"
          fi

      - name: Publish @ai-dossier/mcp-server
        if: steps.check-mcp.outputs.skip != 'true'
        run: |
          cd mcp-server
          npm publish --provenance --access public

      - name: Check if @ai-dossier/worktree-pool needs publishing
        id: check-pool
        run: |
          CURRENT=$(node -p "require('./packages/worktree-pool/package.json').version")
          PUBLISHED=$(npm view @ai-dossier/worktree-pool version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Worktree-pool $CURRENT already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing worktree-pool $CURRENT (current published: $PUBLISHED)"
          fi

      - name: Publish @ai-dossier/worktree-pool
        if: steps.check-pool.outputs.skip != 'true'
        run: |
          cd packages/worktree-pool
          npm publish --provenance --access public

  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify packages are available on npm
        run: |
          echo "Verifying published packages..."
          npm view @ai-dossier/core version
          npm view @ai-dossier/cli version
          npm view @ai-dossier/mcp-server version
          npm view @ai-dossier/worktree-pool version
          # Behavioral smoke testing happens in the pre-publish `smoke` job
          # against the same tarball; this job only confirms registry publish.
